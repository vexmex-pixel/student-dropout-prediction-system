<!DOCTYPE html>
<html>

<head>
<title>Student Dropout Prediction</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="container">

<h1 class="title">Student Dropout Prediction Dashboard</h1>
<p class="subtitle">Powered by XGBoost Machine Learning Model</p>

<form action="/predict" method="post">

<div class="grid">

<!-- Student Details -->
<div class="card">

<h2>Student Details</h2>

<label>Age at Enrollment</label>
<input type="number" name="age" min="16" max="70" required>

<label>Admission Grade</label>
<input type="number" name="admission_grade" min="80" max="200">

<label>Previous Qualification Grade</label>
<input type="number" name="prev_grade" min="80" max="200">

</div>


<!-- Semester Performance -->

<div class="card">

<h2>Semester Performance</h2>

<label>1st Sem Approved Units</label>
<input type="number" name="cu1_approved" min="0" max="10">

<label>2nd Sem Approved Units</label>
<input type="number" name="cu2_approved" min="0" max="10">

<label>1st Sem Grade</label>
<input type="number" name="cu1_grade" min="0" max="20">

<label>2nd Sem Grade</label>
<input type="number" name="cu2_grade" min="0" max="20">

<label>1st Sem Evaluations</label>
<input type="number" name="cu1_eval" min="0" max="10">

<label>2nd Sem Evaluations</label>
<input type="number" name="cu2_eval" min="0" max="10">

</div>


<!-- Enrollment Details -->

<div class="card">

<h2>Enrollment Details</h2>

<label>Course</label>
<select name="course">
{% for c in courses %}
<option value="{{c}}">{{c}}</option>
{% endfor %}
</select>

<label>Application Mode</label>
<select name="app_mode">
{% for m in app_modes %}
<option value="{{m}}">{{m}}</option>
{% endfor %}
</select>

<label>1st Sem Enrolled Units</label>
<input type="number" name="cu1_enrolled" min="0" max="10">

<label>2nd Sem Enrolled Units</label>
<input type="number" name="cu2_enrolled" min="0" max="10">

</div>


<!-- Family Background -->

<div class="card">

<h2>Family Background</h2>

<label>Mother Occupation</label>
<select name="mother_occ">
{% for o in occupations %}
<option value="{{o}}">{{o}}</option>
{% endfor %}
</select>

<label>Father Occupation</label>
<select name="father_occ">
{% for o in occupations %}
<option value="{{o}}">{{o}}</option>
{% endfor %}
</select>

<label>Mother Qualification</label>
<select name="mother_qual">
{% for q in quals %}
<option value="{{q}}">{{q}}</option>
{% endfor %}
</select>

<label>Father Qualification</label>
<select name="father_qual">
{% for q in quals %}
<option value="{{q}}">{{q}}</option>
{% endfor %}
</select>

</div>

</div>


<!-- Economic Section -->

<div class="economic">

<h2>Economic Indicators</h2>

<label>Tuition Fees Up To Date</label>
<select name="tuition">
<option value="1">Yes</option>
<option value="0">No</option>
</select>

<label>GDP</label>
<input type="number" name="gdp" step="0.01">

<label>Inflation Rate</label>
<input type="number" name="inflation" step="0.01">

</div>


<button class="predict-btn">Predict Dropout Risk</button>

</form>


{% if prediction %}

<div class="result">

<h2>{{prediction}}</h2>

<p class="prob">Dropout Probability: {{probability}}%</p>

<div class="meter">
<div class="meter-fill" style="width: {{probability}}%;"></div>
</div>

</div>

{% endif %}

</div>

</body>
</html>
